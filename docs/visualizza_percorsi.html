<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizzatore di percorsi</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            background-color: white;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            width: 500px;
        }

        canvas {
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            cursor: pointer;
        }

        select {
            margin: 10px;
            padding: 5px;
            font-size: 16px;
        }

        .text {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Visualizzatore di percorsi</h1>

        <div class="text">Usare la <b>rotella</b> del mouse per zoomare</div>
        <div class="text">Usare il <b>tasto sinistro</b> del mouse per trascinare</div>

        <select id="pathSelect">
            <option value="0" selected="selected">Test del fattore minimo di correzione della velocità</option>
            <option value="1">Test della distanza minima per aggiornare la posizione</option>
            <option value="2">Esecuzione del percorso rettilineo</option>
            <option value="3">Esecuzione del percorso ad otto</option>
        </select>

        <select id="iterationSelect">
        </select>

        <br>

        <div class="text" id="comment"></div>
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>

    <script>
        // variabili globali
        let points;
        let idealPoints;
        let isDrawingAllowed = true;
        let lastDrawingTimeout;
        const pixelsPerMillimeter = 10;
        // variabili per eventi del mouse
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;
        // variabili relative ad elementi HTML
        const comment = document.getElementById("comment");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const pathSelect = document.getElementById("pathSelect");
        const iterationSelect = document.getElementById("iterationSelect");
        const size = canvas.width;

        // oggetti del visualizzatore
        const Camera = {
            x: 0,
            y: 0,
            mouseX: 0,
            mouseY: 0,
            scale: 1,
            initialPadding: 0.25,

            updateMouse: function (x, y) {
                this.mouseX = this.x + x / this.scale;
                this.mouseY = this.y - y / this.scale;
            },

            reset: function() {
                let minX = idealPoints[0].x;
                let minY = idealPoints[0].y;
                let maxX = minX;
                let maxY = minY;

                for(let i = 1; i < idealPoints.length; ++i) {
                    if(idealPoints[i].x < minX)
                        minX = idealPoints[i].x;
                    else if(idealPoints[i].x > maxX)
                        maxX = idealPoints[i].x;
                    
                    if(idealPoints[i].y < minY)
                        minY = idealPoints[i].y;
                    else if(idealPoints[i].y > maxY)
                        maxY = idealPoints[i].y;
                }

                this.x = minX;
                this.y = maxY;

                let deltaX = maxX - minX;
                let deltaY = maxY - minY;
                let delta;
                if(deltaX > deltaY) {
                    delta = deltaX;
                    this.y += (deltaX - deltaY) / 2;
                }
                else {
                    delta = deltaY;
                    this.x -= (deltaY - deltaX) / 2;
                }

                let paddingPx = this.initialPadding * delta;
                this.x -= paddingPx;
                this.y += paddingPx;
                this.scale = size / (delta + paddingPx * 2);

                draw();
            },

            drag: function(x, y) {
                this.x -= x / this.scale;
                this.y += y / this.scale;
            },
            
            zoom: function(isScrollDownward, mouseX, mouseY) {
                let zoomAmount = 1.1;
                if(isScrollDownward)
                    zoomAmount = 1 / zoomAmount;

                this.scale *= zoomAmount;
                let deltaMouseX = -mouseX * zoomAmount + mouseX;
                let deltaMouseY = mouseY * zoomAmount - mouseY;

                this.x -= deltaMouseX / this.scale;
                this.y -= deltaMouseY / this.scale;

                draw();
            }
        };

        class Point {
            constructor(x, y) {
                this.x = x;
                this.y = y;
            }
        }

        class Position extends Point {
            constructor(x, y, theta) {
                super(x, y);
                this.theta = theta;
            }
        }

                this.points = [];
                this.iterations = [];
                this.comments = [];
            }

            getIteration(index) {
                return this.iterations[index];
            }

            getIdealPath() {
                return this.points;
            }
        }

        let paths = [
            speedCorrectionFactors,
            minimumOdometryDistance,
            lineTests,
            eightTests
        ];

        //funzioni
        function updatePoints() {
            let pathIndex = parseInt(pathSelect.value);
            let currentPath = paths[pathIndex];
            let iterationIndex = parseInt(iterationSelect.value);
            points = currentPath.getIteration(iterationIndex);
            if(currentPath.comments[iterationIndex] != null)
                comment.innerText = currentPath.comments[iterationIndex];
            else
                comment.innerText = "";
        }

        function setIterationSelector() {
            let pathIndex = parseInt(pathSelect.value);
            let currentPath = paths[pathIndex];
            iterationSelect.innerHTML = "";

            for(let i = 0; i < currentPath.iterations.length; ++i) {
                let option = document.createElement("option");
                option.innerText = "Iterazione " + (i + 1);
                option.value = i;
                iterationSelect.appendChild(option);
            }

            idealPoints = currentPath.getIdealPath();
            updatePoints();
        }

        function drawTriangle(position) {
            ctx.save();
            ctx.translate(position.x, position.y);
            ctx.rotate(position.theta);
            
            ctx.beginPath();
            ctx.closePath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-0.5, 0.5);
            ctx.lineTo(1.5, 0);
            ctx.lineTo(-0.5, -0.5);
            ctx.fill();
            ctx.restore();
        }
        
        // disegna una array di punti
        function drawPath(points, color, lineWidth) {
            ctx.save();

            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++)
                ctx.lineTo(points[i].x, points[i].y);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.stroke();

            ctx.fillStyle = color;
            for (let i = 0; i < points.length; i++)
                if(points[i].theta != null)
                    drawTriangle(points[i]);

            ctx.restore();
        }

        // disegna il percorso selezionato e il relativo percorso ideale
        function draw() {
            /* la canvas può essere disegnata solo ogni 10 millisecondi, per evitare lag in caso di molti eventi ravvicinati
               lastDrawingTimeout serve ad evitare che gli ultimi eventi che richiedono il disegno non vengano mostrati a schermo*/
            if(isDrawingAllowed) {
                isDrawingAllowed = false;
                drawingTimeout = setTimeout(function(){isDrawingAllowed = true;}, 20);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.save();
                ctx.scale(Camera.scale, -Camera.scale);
                ctx.translate(-Camera.x, -Camera.y);

                drawPath(idealPoints, "blue", 0.5);
                drawPath(points, "#333", 0.5);

                ctx.restore();
                ctx.fillStyle = "#808080";
                ctx.font = "12px serif";
                ctx.fillText("x: " + Camera.mouseX.toFixed(3) + "mm, y: " + Camera.mouseY.toFixed(3) + "mm", 0, 12);
            } else {
                clearTimeout(lastDrawingTimeout);
                lastDrawingTimeout = setTimeout(function(){draw();}, 20);
            }
        }

        // event Listener per gli elementi select
        pathSelect.addEventListener("change", () => {
            setIterationSelector();
            Camera.reset();
        });

        iterationSelect.addEventListener("change", () => {
            updatePoints();
            draw();
        });

        // event listener per il mouse
        canvas.addEventListener("mousedown", (e) => {
            if (e.button === 0) {  // tasto sinistro
                isDragging = true;
                lastX = e.offsetX;
                lastY = e.offsetY;
            }
        });

        canvas.addEventListener("mousemove", (e) => {
            if (isDragging) {
                const deltaX = e.offsetX - lastX;
                const deltaY = e.offsetY - lastY;
                Camera.drag(deltaX, deltaY);
                lastX = e.offsetX;
                lastY = e.offsetY;
            }
            
            const canvasRect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - canvasRect.left;
            const mouseY = e.clientY - canvasRect.top;
            Camera.updateMouse(mouseX, mouseY);
            draw();
        });

        document.body.addEventListener("mouseup", () => {
            isDragging = false;
        });
        
        canvas.addEventListener("wheel", (e) => {
            e.preventDefault();

            const canvasRect = canvas.getBoundingClientRect();         
            const mouseX = e.clientX - canvasRect.left;
            const mouseY = e.clientY - canvasRect.top;

            Camera.updateMouse(mouseX, mouseY);
            Camera.zoom(e.deltaY > 0, mouseX, mouseY);
        });

        // quandi la finestra/tab perde il focus
        window.addEventListener("blur", () => { isDragging = false; });
        canvas.addEventListener("mouseleave", function(){ isDragging = false; });

        // disegno iniziale
        setIterationSelector();
        Camera.reset();
    </script>
